<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE REAL OVERLAP - Skin Builder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --miku: #39C5BB; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Kanit', sans-serif; background: #000; color: white; display: flex; flex-direction: column; align-items: center; }
        
        .ui-panel {
            position: sticky; top: 0; z-index: 1000; width: 100%; background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(10px); border-bottom: 1px solid #333; padding: 10px;
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
        }
        .input-group { display: flex; flex-direction: column; gap: 2px; }
        label { font-size: 10px; color: var(--miku); font-weight: bold; }
        input { background: #222; border: 1px solid var(--miku); color: #fff; padding: 6px; border-radius: 4px; width: 80px; text-align: center; }
        
        .btn { border: none; border-radius: 6px; padding: 10px 15px; font-weight: bold; cursor: pointer; }
        .btn-up { background: var(--miku); color: #000; }
        .btn-sav { background: #fff; color: #000; }

        #stage { width: 100%; overflow: visible; padding: 60px 20px; display: flex; justify-content: center; }
        
        #collage {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
            background: transparent;
            /* ล็อคความกว้างตายตัว ห้ามมือถือมาบีบกล่องเด็ดขาด */
            width: var(--container-w, 800px); 
            min-width: var(--container-w, 800px);
            max-width: var(--container-w, 800px);
        }

        .item {
            position: relative;
            width: var(--w, 120px);
            margin-right: var(--mx, 0px);
            margin-bottom: var(--my, 0px);
            overflow: visible;
            cursor: move;
        }
        .item:hover { z-index: 9999 !important; transform: scale(1.1); }
        
        .item img {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
            flex-shrink: 0;
        }

        .del {
            position: absolute; top: -5px; right: -5px; background: red; color: white;
            width: 20px; height: 20px; border-radius: 50%; font-size: 12px;
            display: none; align-items: center; justify-content: center; z-index: 110; border: none;
        }
        .item:hover .del { display: flex; }

        #load { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div id="load"><div style="color:var(--miku)">กำลังประมวลผลพิกเซล...</div></div>

<div class="ui-panel">
    <div class="input-group"><label>สกินต่อแถว</label><input type="number" id="cols" value="4" min="1"></div>
    <div class="input-group"><label>ขนาดรูป</label><input type="number" id="w" value="150"></div>
    <div class="input-group"><label>ซ้อนซ้าย-ขวา</label><input type="number" id="mx" value="-30"></div>
    <div class="input-group"><label>ซ้อนบน-ล่าง</label><input type="number" id="my" value="-40"></div>
    <button class="btn btn-up" onclick="document.getElementById('file').click()">+ เพิ่มสกิน</button>
    <button class="btn btn-sav" onclick="save()">เซฟภาพ</button>
    <input type="file" id="file" multiple accept="image/*" style="display:none">
</div>

<div id="stage"><div id="collage"></div></div>

<script>
    const collage = document.getElementById('collage');
    const load = document.getElementById('load');

    function updateZ() {
        const items = document.querySelectorAll('.item');
        items.forEach((item, i) => {
            item.style.zIndex = items.length - i; 
        });
    }

    async function crop(file) {
        return new Promise(res => {
            const img = new Image();
            img.src = URL.createObjectURL(file);
            img.onload = () => {
                const cvs = document.createElement('canvas');
                const ctx = cvs.getContext('2d', {willReadFrequently:true});
                cvs.width = img.width; cvs.height = img.height;
                ctx.drawImage(img, 0, 0);
                const data = ctx.getImageData(0,0,cvs.width,cvs.height).data;
                let t=cvs.height, b=0, l=cvs.width, r=0, found=false;
                for(let y=0; y<cvs.height; y++) {
                    for(let x=0; x<cvs.width; x++) {
                        if(data[(y*cvs.width+x)*4+3] > 20) {
                            t=Math.min(t,y); b=Math.max(b,y); l=Math.min(l,x); r=Math.max(r,x); found=true;
                        }
                    }
                }
                if(!found) { res(img.src); return; }
                const cCvs = document.createElement('canvas');
                cCvs.width = r-l+1; cCvs.height = b-t+1;
                cCvs.getContext('2d').drawImage(img, l, t, cCvs.width, cCvs.height, 0, 0, cCvs.width, cCvs.height);
                res(cCvs.toDataURL());
                URL.revokeObjectURL(img.src);
            };
        });
    }

    function refresh() {
        let cols = Math.max(1, parseInt(document.getElementById('cols').value) || 1);
        let w = parseFloat(document.getElementById('w').value) || 150;
        let mx = parseFloat(document.getElementById('mx').value) || 0;
        let my = parseFloat(document.getElementById('my').value) || 0;

        // สูตรคำนวณความกว้างที่ถูกต้อง: (จำนวนรูปที่ซ้อนกัน) + รูปสุดท้ายที่กางเต็ม + เผื่อพื้นที่นิดนึงกันเบียด
        let exactWidth = ((cols - 1) * (w + mx)) + w + 5; 

        collage.style.setProperty('--container-w', exactWidth + 'px');
        collage.style.setProperty('--w', w + 'px');
        collage.style.setProperty('--mx', mx + 'px');
        collage.style.setProperty('--my', my + 'px');
        
        let availableWidth = window.innerWidth - 40;
        if (exactWidth > availableWidth) {
            collage.style.transform = `scale(${availableWidth / exactWidth})`;
            collage.style.transformOrigin = 'top center';
        } else {
            collage.style.transform = 'none';
        }
    }

    ['cols','w','mx','my'].forEach(id => document.getElementById(id).oninput = refresh);
    window.addEventListener('resize', refresh); 

    document.getElementById('file').onchange = async (e) => {
        const files = Array.from(e.target.files);
        if(!files.length) return;
        load.style.display = 'flex';
        for(let f of files) {
            const url = await crop(f);
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<button class="del" onclick="this.parentElement.remove(); updateZ();">✕</button><img src="${url}">`;
            collage.appendChild(div);
        }
        updateZ(); 
        load.style.display = 'none';
        refresh();
    };

    new Sortable(collage, { animation: 150, onSort: updateZ });

    async function save() {
        if(!collage.children.length) return;
        load.style.display = 'flex';
        document.querySelectorAll('.del').forEach(b => b.style.opacity = '0');
        
        collage.style.transform = 'none';
        
        const cvs = await html2canvas(collage, { scale: 2, backgroundColor: null });
        const a = document.createElement('a');
        a.download = `Skins-Final.png`;
        a.href = cvs.toDataURL();
        a.click();
        
        document.querySelectorAll('.del').forEach(b => b.style.opacity = '1');
        refresh(); 
        load.style.display = 'none';
    }
    refresh();
</script>
</body>
</html>
